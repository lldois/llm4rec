### model
model_name_or_path: OpenOneRec/OneReason-0.8B-pretrain-competition
trust_remote_code: true
flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
enable_liger_kernel: true
lora_rank: 64
lora_alpha: 64
lora_dropout: 0.05
lora_target: all
use_dora: true

### dataset
dataset: exp_v49_public_091_exact
dataset_dir: demo/LLaMA-Factory/data
template: qwen3_nothink
cutoff_len: 32768
packing: true
neat_packing: true
overwrite_cache: false
preprocessing_num_workers: 16
dataloader_num_workers: 8

### output
output_dir: /home/ll/llm4rec/experiments/outputs/v57_public091_dora_r64_lr8e5_ep2
logging_steps: 10
save_strategy: "no"
save_total_limit: 1
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: tensorboard
logging_dir: /home/ll/llm4rec/experiments/outputs/v57_public091_dora_r64_lr8e5_ep2/tb

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 8.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.001
max_grad_norm: 1.0
bf16: true
pure_bf16: true
seed: 202607207
